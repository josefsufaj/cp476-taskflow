<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo-icon">TF</div>
            <h1>TaskFlow</h1>
        </div>
        <div class="header-right">
            <span class="welcome-text">Welcome, <span id="usernameDisplay">User</span></span>
            <button class="btn-logout" id="logoutBtn">Logout</button>
        </div>
    </header>

    <!-- Dashboard Content -->
    <main class="dashboard">
        <!-- Toolbar -->
        <div class="dashboard-toolbar">
            <button class="btn-add-task" id="addTaskBtn">
                <span>+</span> Add Task
            </button>
            <div class="filter-controls">
                <label for="filterStatus">Status:</label>
                <select id="filterStatus">
                    <option value="all">All</option>
                    <option value="pending">Pending</option>
                    <option value="in_progress">In Progress</option>
                    <option value="completed">Completed</option>
                </select>
                <label for="filterPriority">Priority:</label>
                <select id="filterPriority">
                    <option value="all">All</option>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
        </div>
        <div id="dashboardAlert" class="alert alert-error" role="alert"></div>

        <!-- Task List Container -->
        <div class="task-list-container">
            <!-- Table Header -->
            <div class="task-list-header" id="taskListHeader" style="display: none;">
                <div></div>
                <div>Title</div>
                <div>Due Date</div>
                <div>Priority</div>
                <div>Status</div>
                <div>Actions</div>
            </div>

            <!-- Task Items (rendered by JS) -->
            <div id="taskList"></div>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">+</div>
                <h3>No tasks yet</h3>
                <p>Get started by creating your first task</p>
                <button class="btn-add-task" id="emptyAddTaskBtn">
                    <span>+</span> Add Task
                </button>
            </div>
        </div>
    </main>

    <!-- Add/Edit Task Modal -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="taskModalTitle">Add New Task</h2>
                <button class="modal-close" id="taskModalClose">&times;</button>
            </div>
            <form id="taskForm" novalidate>
                <div class="modal-body">
                    <!-- Title -->
                    <div class="form-group">
                        <label for="taskTitle">Title <span class="required">*</span></label>
                        <input
                            type="text"
                            id="taskTitle"
                            name="title"
                            placeholder="Enter task title"
                            required
                            maxlength="100"
                        >
                        <div class="form-error" id="taskTitleError">Title is required (max 100 characters).</div>
                    </div>

                    <!-- Description -->
                    <div class="form-group">
                        <label for="taskDescription">Description <span class="optional">(optional)</span></label>
                        <textarea
                            id="taskDescription"
                            name="description"
                            placeholder="Enter task description"
                            maxlength="500"
                            rows="4"
                        ></textarea>
                    </div>

                    <!-- Due Date -->
                    <div class="form-group">
                        <label for="taskDueDate">Due Date <span class="required">*</span></label>
                        <input
                            type="date"
                            id="taskDueDate"
                            name="due_date"
                            required
                        >
                        <div class="form-error" id="taskDueDateError">Please select a valid due date.</div>
                    </div>

                    <!-- Priority -->
                    <div class="form-group">
                        <label for="taskPriority">Priority</label>
                        <select id="taskPriority" name="priority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>

                    <!-- Status (only visible in edit mode) -->
                    <div class="form-group" id="statusGroup" style="display: none;">
                        <label for="taskStatus">Status</label>
                        <select id="taskStatus" name="status">
                            <option value="pending">Pending</option>
                            <option value="in_progress">In Progress</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" id="taskCancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="width: auto;">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal-overlay delete-modal" id="deleteModal">
        <div class="modal">
            <div class="modal-body">
                <div class="warning-icon">&#9888;</div>
                <h3>Delete Task?</h3>
                <p>Are you sure you want to delete this task?</p>
                <p class="task-name" id="deleteTaskName">"Task Name"</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" id="deleteCancelBtn">Cancel</button>
                <button class="btn btn-danger" id="deleteConfirmBtn">Delete</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
