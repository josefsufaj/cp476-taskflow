<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Create Account</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <!-- Logo -->
        <div class="auth-logo">
            <div class="logo-icon">TF</div>
            <h1>TaskFlow</h1>
        </div>

        <!-- Register Card -->
        <div class="auth-card">
            <h2>Create Account</h2>

            <!-- Alert message area -->
            <div id="registerAlert" class="alert alert-error" role="alert"></div>

            <form id="registerForm" novalidate>
                <!-- Username -->
                <div class="form-group">
                    <label for="username">Username</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="johndoe"
                        required
                        minlength="3"
                        maxlength="20"
                        autocomplete="username"
                    >
                    <div class="form-error" id="usernameError">Username must be 3-20 characters.</div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="you@example.com"
                        required
                        autocomplete="email"
                    >
                    <div class="form-error" id="emailError">Please enter a valid email address.</div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;"
                        required
                        minlength="8"
                        autocomplete="new-password"
                    >
                    <div class="form-error" id="passwordError">Password must be at least 8 characters with one number and one letter.</div>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input
                        type="password"
                        id="confirmPassword"
                        name="confirmPassword"
                        placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;"
                        required
                        autocomplete="new-password"
                    >
                    <div class="form-error" id="confirmPasswordError">Passwords do not match.</div>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn btn-primary">Register</button>
            </form>

            <!-- Footer -->
            <div class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
