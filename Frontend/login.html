<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <!-- Logo -->
        <div class="auth-logo">
            <div class="logo-icon">TF</div>
            <h1>TaskFlow</h1>
        </div>

        <!-- Login Card -->
        <div class="auth-card">
            <h2>Login</h2>

            <!-- Alert message area -->
            <div id="loginAlert" class="alert alert-error" role="alert"></div>
            <div id="successAlert" class="alert alert-success" role="alert"></div>

            <form id="loginForm" novalidate>
                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="you@example.com"
                        required
                        autocomplete="email"
                    >
                    <div class="form-error" id="emailError">Please enter a valid email address.</div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;"
                            required
                            autocomplete="current-password"
                        >
                        <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
                            &#128065;
                        </button>
                    </div>
                    <div class="form-error" id="passwordError">Password is required.</div>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn btn-primary">Login</button>
            </form>

            <!-- Footer -->
            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign up</a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
